name: mirildan
description: "Duygularını yakala, takip etme."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Navigation
  go_router: ^14.8.1

  # Data classes
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Audio
  record: ^5.2.0
  just_audio: ^0.9.42
  permission_handler: ^11.3.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4

  # UI & Animation
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # Utilities
  flutter_local_notifications: ^18.0.1
  share_plus: ^10.1.4
  intl: ^0.20.2
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.1
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  mockito: ^5.4.5

flutter:
  uses-material-design: true
  generate: true

name: mirildan
description: "Duygularını yakala, takip etme."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Database
  sqflite: ^2.3.3
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  path: ^1.9.0

  # Navigation
  go_router: ^17.2.2

  # Data classes
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Audio
  record: ^6.2.0
  just_audio: ^0.10.5
  permission_handler: ^12.0.1

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # UI & Animation
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # Utilities
  flutter_local_notifications: ^21.0.0
  share_plus: ^13.1.0
  intl: ^0.20.2
  uuid: ^4.5.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.9.4
  mockito: ^5.4.5
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
  generate: true
